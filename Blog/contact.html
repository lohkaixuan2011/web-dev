<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="contact.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <title>Document</title>
</head>

<body>
    <header>
        <a href="index.html">Cobee The Coder</a>
        <a href="project.html">Project</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About Us</a>
    </header>


    <main>
        <div class="contact-container">
            <div class="ilustration">
                <div data-aos="zoom-out" data-aos-anchor-placement="center-bottom" data-aos-delay="200"
                    data-aos-duration="2000">
                    <img class="illustration-img" src="assets/phone.png" alt="" width="800px">
                </div>
            </div>
            <div class="contact">
                <div data-aos="flip-left" data-aos-easing="ease-out-cubic" data-aos-duration="2000">
                    <img class="profile-contact-img" src="assets/avatar.png" alt="">
                </div>
                <h1>Contact Me</h1>
                <p>Please feel free to contact me</p>
                <h4>Your Information</h4>

                <form action="https://formsubmit.co/marcusloh.2011@gmail.com" autocomplete="off" method="post">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_next" class="next">
                    <div class="form-container">
                        <!-- Input Name Column -->
                        <div class="input-container">
                            <div class="icon">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="form-input">
                                <input class="input-item" type="text" name="name" id="name" placeholder="">
                                <label for="name" class="form-label">Name</label>
                            </div>
                        </div>

                        <!-- Input City Column -->
                        <div class="input-container">
                            <div class="icon">
                                <i class="fas fa-map-alt"></i>
                            </div>
                            <div class="form-input">
                                <input class="input-item" type="text" name="city" id="city" placeholder="">
                                <label for="city" class="form-label">City</label>
                            </div>
                        </div>

                        <!-- Input Email Column -->
                        <div class="input-container">
                            <div class="icon">
                                <i class="far fa-envelope-open"></i>
                            </div>
                            <div class="form-input">
                                <input class="input-item" type="text" name="email" id="email" placeholder="">
                                <label for="email" class="form-label">Email</label>
                            </div>
                        </div>

                        <!-- Input Message Column -->
                        <div class="textarea-container">
                            <div class="icon">
                                <i class="fas fa-comment"></i>
                            </div>
                            <div class="form-textarea">
                                <textarea class="textarea" type="text" name="message" id="message" cols="52" rows="8"
                                    placeholder=""></textarea>
                                <label for="message" class="form-label">Message</label>
                            </div>
                        </div>
                    </div>

                    <input type="submit" value="Submit" class="submit">
                </form>
            </div>
        </div>

        <div class="modal-container">
            <div class="modal">
                <img src="assets/rocket.png" alt="">
                <h3>Message Sent</h3>
                <p>Thanks you for submitting !!!</p>
            </div>
        </div>

    </main>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="script.js"></script>
</body>

</html>
